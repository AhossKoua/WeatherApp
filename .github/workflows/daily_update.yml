name: Daily Weather Update
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
jobs:
  update-data:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.2'
          use-public-rspm: true

      - name: Install R Packages
        run: |
          Rscript -e '
            install.packages("pak", repos="https://r-lib.github.io/p/pak/stable/")
            install.packages("remotes")
            remotes::install_version("terra", version="1.7-78")
            install.packages(c("KernSmooth", "MASS", "lattice"),
                           repos="https://packagemanager.posit.co/cran/__linux__/jammy/latest")
            pak::pak(c(
              "tidyverse", "rdwd", "geosphere", "shiny",
              "bslib", "plotly", "rsconnect", "leaflet",
              "bsicons", "lubridate", "cpp11", "progress"
            ))
            cat("terra version:", as.character(packageVersion("terra")), "\n")
            cat("rsconnect path:", find.package("rsconnect"), "\n")
          '

      - name: Run Update Script
        run: Rscript update_weather.R

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action" || true
          git config --global user.email "actions@github.com" || true
          git fetch origin main || true
          git reset --hard origin/main || true
          git add Bro_web_app/weather_data_full.rds || true
          git commit -m "Daily weather update: $(date +'%Y-%m-%d')" || true
          git push || true

      - name: Deploy to shinyapps.io
        env:
          SHINY_ACC_NAME: ${{ secrets.SHINY_ACC_NAME }}
          SHINY_TOKEN: ${{ secrets.SHINY_TOKEN }}
          SHINY_SECRET: ${{ secrets.SHINY_SECRET }}
        run: |
          Rscript -e "
            options(repos = c(
              CRAN = 'https://packagemanager.posit.co/cran/__linux__/jammy/latest'
            ))
            rsconnect::setAccountInfo(
              name=Sys.getenv('SHINY_ACC_NAME'),
              token=Sys.getenv('SHINY_TOKEN'),
              secret=Sys.getenv('SHINY_SECRET')
            )
            rsconnect::deployApp(
              appDir='Bro_web_app',
              appName='orchard_weather_tool',
              forceUpdate=TRUE,
              lint=FALSE
            )
          "
